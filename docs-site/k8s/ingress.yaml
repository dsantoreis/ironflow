apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ironflow-docs
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: docs.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ironflow-docs
                port:
                  number: 80
