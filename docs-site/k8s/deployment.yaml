apiVersion: apps/v1
kind: Deployment
metadata:
  name: ironflow-docs
  labels:
    app: ironflow-docs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ironflow-docs
  template:
    metadata:
      labels:
        app: ironflow-docs
    spec:
      containers:
        - name: docs
          image: ironflow-docs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4321
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 15
            periodSeconds: 20
