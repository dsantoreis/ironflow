name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + Integration tests
        run: cargo test --all

      - name: Build
        run: cargo build --release

      - name: Coverage gate (>=80%)
        run: cargo llvm-cov --all-targets --fail-under-lines 80 --summary-only

      - name: Coverage report artifact
        run: cargo llvm-cov --all-targets --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: ironflow-rust-coverage
          path: lcov.info

  docs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install docs deps
        run: npm ci
      - name: Build Astro Starlight docs
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, docs-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ironflow:ci .
